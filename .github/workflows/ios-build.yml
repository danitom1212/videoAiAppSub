name: iOS Build (Simulator + IPA)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build for Simulator
        run: |
          xcodebuild \
            -project VideoTranslator/VideoTranslator.xcodeproj \
            -scheme VideoTranslator \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 14' \
            build

      - name: Build IPA for Appetize
        run: |
          xcodebuild \
            -project VideoTranslator/VideoTranslator.xcodeproj \
            -scheme VideoTranslator \
            -configuration Debug \
            -sdk iphoneos \
            -archivePath VideoTranslator.xcarchive \
            archive

      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath VideoTranslator.xcarchive \
            -exportPath . \
            -exportOptionsPlist exportOptions.plist

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v3
        with:
          name: VideoTranslator.ipa
          path: VideoTranslator.ipa

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List schemes
        run: xcodebuild -list -project VideoTranslator/VideoTranslator.xcodeproj

      - name: Build (iOS Simulator)
        run: |
          set -euo pipefail
          xcodebuild \
            -project VideoTranslator/VideoTranslator.xcodeproj \
            -scheme VideoTranslator \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            build
        env:
          NSUnbufferedIO: "YES"

      - name: Upload DerivedData logs (if build fails)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ~/Library/Logs/DiagnosticReports
            ~/Library/Developer/Xcode/DerivedData

# Notes:
# - This workflow builds for the simulator only, so it does NOT require code signing.
# - For TestFlight/App Store builds, you'll need an Apple Developer account + signing secrets.
